<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reportes Guadalajara</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Reportes Guadalajara</h1>
    </header>

    <main class="container">
        <section class="formulario">
            <h2>Nuevo Reporte</h2>
            <input type="text" id="descripcion" placeholder="¿Qué problema hay?">
            <input type="text" id="ubicacion" placeholder="Ubicación (Colonia, calle...)">
            
            <label class="upload-box" for="imagen">
                <span id="label-text">📸 Toca para subir foto</span>
                <input type="file" id="imagen" accept="image/*" onchange="actualizarNombreArchivo()">
            </label>

            <button class="btn-enviar" onclick="agregarReporte()">Enviar Reporte</button>
        </section>

        <hr>

        <section>
            <h2>Reportes Recientes</h2>
            <div id="listaReportes" class="grid-reportes"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
