<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbeGDL</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <header>
        <div class="header-text">
            <img src="imagenes/logo.png" alt="Logo" class="logo">
            <h1>UrbeGDL</h1>
            <p>Reportes Ciudadanos</p>
        </div>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <div class="header-menu" id="headerMenu">
            <a href="login.html" class="btn-login-header">Iniciar Sesión</a>
            <a href="unete.html" class="btn-unete-header">Únete a nuestra causa</a>
        </div>
    </header>

    <main class="container">
        <section class="formulario">
            <h2>Nuevo Reporte</h2>
            <input type="text" id="descripcion" placeholder="¿Qué problema hay?">
            
            <label>Selecciona la ubicación en el mapa:</label>
            <div id="mapa"></div>
            <input type="hidden" id="ubicacion" value="">
            <p id="ubicacion-texto" class="ubicacion-preview"></p>
            
            <label class="upload-box" for="imagen">
                <span id="label-text">Añadir foto</span>
                <input type="file" id="imagen" accept="image/*" onchange="actualizarNombreArchivo()">
            </label>

            <button class="btn-enviar" onclick="agregarReporte()">Enviar Reporte</button>
        </section>

        <section>
            <h2>Historial de Reportes</h2>
            <div id="listaReportes" class="grid-reportes"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
