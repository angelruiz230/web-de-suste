<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UrbeGDL - Reportes Ciudadanos</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>

<header>
    <div class="header-left">
        <img src="imagenes/logo.png" alt="Logo" class="logo">
        <h1>UrbeGDL</h1>
    </div>
    
    <div class="header-center">
        <input type="text" id="buscar" placeholder="Buscar reportes..." oninput="filtrarReportes()">
    </div>
    
    <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    
    <div class="header-right" id="headerMenu">
        <a href="login.html" class="btn-login">Iniciar Sesión</a>
        <a href="unete.html" class="btn-register">Únete</a>
    </div>
</header>

<main class="container">
    <!-- Columna Izquierda: Info + Formulario -->
    <aside class="sidebar">
        <section class="info-box">
            <h2>¿Qué es UrbeGDL?</h2>
            <p>Plataforma ciudadana para reportar incidencias en Guadalajara.</p>
            
            <h3>Misión</h3>
            <p>Herramienta digital directa para reportes ciudadanos.</p>
            
            <h3>Visión</h3>
            <p>Ser la plataforma de referencia en Jalisco.</p>
        </section>

        <section class="form-box">
            <h2>📝 Nuevo Reporte</h2>
            
            <input type="text" id="descripcion" placeholder="Describe el problema (mín. 10 caracteres)">
            
            <label>📍 Selecciona ubicación:</label>
            <div id="mapa"></div>
            <input type="hidden" id="ubicacion" value="">
            <p id="ubicacion-texto" class="ubicacion-preview"></p>
            
            <label class="upload-box">
                <span id="label-text">📷 Añadir foto</span>
                <input type="file" id="imagen" accept="image/*" onchange="actualizarNombreArchivo()">
            </label>

            <button class="btn-submit" onclick="agregarReporte()">📤 Enviar Reporte</button>
        </section>
    </aside>

    <!-- Columna Derecha: Reportes -->
    <section class="reports-section">
        <h2>📋 Reportes Recientes</h2>
        <div id="listaReportes" class="grid-reportes"></div>
    </section>
</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
